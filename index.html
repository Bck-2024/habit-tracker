<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="习惯打卡" />
<title>习惯打卡</title>
<style>
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-mid: #9FE1CB; --green-dark: #0F6E56;
    --amber: #BA7517; --red: #E24B4A;
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a1a; --text2: #6b6b67;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f7; --text2: #aeaeb2;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --green-light: #0a3d2b; --green-mid: #0f5c40;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* 锁定页 */
  .lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; padding: 2rem; }
  .lock-icon { font-size: 48px; margin-bottom: 1.5rem; }
  .lock-title { font-size: 20px; font-weight: 600; margin-bottom: 0.5rem; }
  .lock-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
  .lock-input { width: 100%; max-width: 280px; padding: 12px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 16px; background: var(--bg2); color: var(--text); text-align: center; letter-spacing: 2px; margin-bottom: 12px; -webkit-appearance: none; }
  .lock-btn { width: 100%; max-width: 280px; padding: 13px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; }
  .lock-error { font-size: 13px; color: var(--red); margin-top: 10px; min-height: 18px; text-align: center; }

  /* 同步状态 */
  .sync-bar { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 11px; color: var(--text2); padding: 0.4rem 0 0; min-height: 22px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .app { max-width: 480px; margin: 0 auto; padding: 0 1rem 6rem; }
  .header { text-align: center; padding: 1rem 0 1rem; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 0.75rem; }
  .score-num { font-size: 38px; font-weight: 600; color: var(--green); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .total-pts { font-size: 13px; color: var(--text2); }
  .total-pts b { color: var(--green); font-weight: 600; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-top: 0.25rem; }
  .tab { flex: 1; text-align: center; padding: 0.65rem 0; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; user-select: none; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
  .sec-title { font-size: 12px; color: var(--text2); margin-bottom: 0.6rem; }
  .progress-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; margin-bottom: 0.6rem; }
  .progress-bar { height: 4px; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .habit-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .habit-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 11px 13px; display: flex; align-items: center; gap: 11px; transition: border-color 0.15s; }
  .habit-card.done { border-color: var(--green); background: var(--green-light); }
  .h-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: var(--bg2); }
  .habit-card.done .h-icon { background: var(--green-mid); }
  .h-info { flex: 1; min-width: 0; }
  .h-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-pts { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .habit-card.done .h-pts { color: var(--green-dark); }
  .edit-btn { font-size: 12px; color: var(--text2); cursor: pointer; padding: 5px 7px; border-radius: 6px; flex-shrink: 0; }
  .h-check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
  .habit-card.done .h-check { background: var(--green); border-color: var(--green); }
  .ck-inner { width: 9px; height: 7px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px,-1px); display: none; }
  .habit-card.done .ck-inner { display: block; }
  .add-btn { width: 100%; padding: 11px; border: 0.5px dashed var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 1.5rem; }
  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .shop-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 13px; cursor: pointer; user-select: none; }
  .shop-card.unaffordable { opacity: 0.45; cursor: not-allowed; }
  .sh-icon { font-size: 28px; margin-bottom: 7px; }
  .sh-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .sh-cost { font-size: 12px; color: var(--green); font-weight: 500; }
  .sh-edit { font-size: 11px; color: var(--text2); margin-top: 7px; cursor: pointer; display: inline-block; }
  .redeem-log { margin-top: 1.5rem; }
  .redeem-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .r-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .chart-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 1.5rem; }
  .history-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .h-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .h-time { color: var(--text2); font-size: 11px; margin-left: auto; white-space: nowrap; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: var(--bg); border-radius: 18px 18px 0 0; padding: 1.5rem 1.25rem; width: 100%; max-width: 480px; padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1.1rem; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .modal input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg2); color: var(--text); margin-bottom: 12px; -webkit-appearance: none; appearance: none; }
  .modal-btns { display: flex; gap: 8px; margin-top: 0.25rem; }
  .btn-primary { flex: 1; padding: 12px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-cancel { flex: 1; padding: 12px; background: var(--bg2); color: var(--text2); border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
  .btn-danger { padding: 12px 16px; background: #fdeaea; color: var(--red); border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
  .toast { position: fixed; top: 1.2rem; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 9px 22px; border-radius: 20px; font-size: 13px; z-index: 200; pointer-events: none; white-space: nowrap; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- 密码锁定页 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">习惯打卡</div>
  <div class="lock-sub">请输入密码继续</div>
  <input class="lock-input" id="lockInput" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')unlock()" />
  <button class="lock-btn" onclick="unlock()">进入</button>
  <div class="lock-error" id="lockError"></div>
</div>

<!-- 主应用 -->
<div class="app hidden" id="mainApp">
  <div class="header">
    <div class="sync-bar">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">已同步</span>
    </div>
    <div class="score-circle">
      <div class="score-num" id="todayScore">0</div>
      <div class="score-lbl">今日积分</div>
    </div>
    <div class="total-pts">可用积分：<b id="totalScore">0</b></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">打卡</div>
    <div class="tab" onclick="switchTab('shop')">商城</div>
    <div class="tab" onclick="switchTab('stats')">统计</div>
    <div class="tab" onclick="switchTab('history')">记录</div>
  </div>

  <div id="tab-today">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="sec-title" id="progressText">今日进度：0 / 0</div>
    <div class="habit-list" id="habitList"></div>
    <button class="add-btn" onclick="openHabitModal()">＋ 添加习惯</button>
  </div>

  <div id="tab-shop" class="hidden">
    <div class="sec-title" style="margin-bottom:0.8rem;">点击奖励可兑换 · 点「编辑」可修改</div>
    <div class="shop-grid" id="shopGrid"></div>
    <button class="add-btn" onclick="openShopModal()">＋ 添加奖励</button>
    <div class="redeem-log">
      <div class="sec-title">兑换记录</div>
      <div id="redeemList"></div>
    </div>
  </div>

  <div id="tab-stats" class="hidden">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">累计获得</div></div>
      <div class="stat-card"><div class="stat-val" id="statDays">0</div><div class="stat-lbl">打卡天数</div></div>
      <div class="stat-card"><div class="stat-val" id="statBest">0</div><div class="stat-lbl">单日最高</div></div>
    </div>
    <div class="sec-title">近 7 天积分</div>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    <div class="sec-title">习惯完成次数</div>
    <div class="chart-wrap" style="height:240px;"><canvas id="habitChart"></canvas></div>
  </div>

  <div id="tab-history" class="hidden">
    <div class="sec-title">全部打卡与兑换记录</div>
    <div id="historyList"></div>
  </div>
</div>

<!-- 习惯弹窗 -->
<div class="modal-bg hidden" id="habitModal">
  <div class="modal">
    <h3 id="habitModalTitle">添加习惯</h3>
    <label>习惯名称</label>
    <input id="hName" placeholder="如：跑步 30 分钟" />
    <label>分值（整数）</label>
    <input id="hPts" type="number" min="1" max="999" step="1" value="2" />
    <label>图标（emoji）</label>
    <input id="hIcon" placeholder="如 🏃" maxlength="4" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeHabitModal()">取消</button>
      <button class="btn-danger hidden" id="hDeleteBtn" onclick="deleteHabit()">删除</button>
      <button class="btn-primary" onclick="saveHabit()">保存</button>
    </div>
  </div>
</div>

<!-- 奖励弹窗 -->
<div class="modal-bg hidden" id="shopModal">
  <div class="modal">
    <h3 id="shopModalTitle">添加奖励</h3>
    <label>奖励名称</label>
    <input id="sName" placeholder="如：看一部电影" />
    <label>所需积分</label>
    <input id="sCost" type="number" min="1" value="50" />
    <label>图标（emoji）</label>
    <input id="sIcon" placeholder="如 🎬" maxlength="4" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeShopModal()">取消</button>
      <button class="btn-danger hidden" id="sDeleteBtn" onclick="deleteReward()">删除</button>
      <button class="btn-primary" onclick="saveReward()">保存</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = 'https://habit-tracker.w1657843622.workers.dev';
const DEF_HABITS = [
  {id:1,name:'晨跑 / 运动',pts:5,icon:'🏃'},
  {id:2,name:'阅读 30 分钟',pts:2,icon:'📚'},
  {id:3,name:'冥想 10 分钟',pts:3,icon:'🧘'},
  {id:4,name:'喝足够的水',pts:1,icon:'💧'},
  {id:5,name:'早睡（23 点前）',pts:2,icon:'🌙'},
];
const DEF_REWARDS = [
  {id:201,name:'看一部电影',cost:30,icon:'🎬'},
  {id:202,name:'吃一顿好的',cost:50,icon:'🍜'},
  {id:203,name:'睡一次懒觉',cost:20,icon:'😴'},
  {id:204,name:'买一件心仪物',cost:200,icon:'🛍️'},
];

let PWD = '', S = {}, editHabitId = null, editRewardId = null, syncTimer = null;
const today = new Date().toISOString().slice(0,10);

async function unlock(){
  const pwd = document.getElementById('lockInput').value.trim();
  if(!pwd){ document.getElementById('lockError').textContent = '请输入密码'; return; }
  document.getElementById('lockError').textContent = '';
  setSyncStatus('syncing','验证中...');
  try {
    const res = await fetch(API+'/data', { headers:{'X-Password':pwd} });
    if(res.status===401){ document.getElementById('lockError').textContent='密码错误，请重试'; setSyncStatus('error',''); return; }
    const data = await res.json();
    PWD = pwd;
    S = initState(data);
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    renderHabits();
    setSyncStatus('ok','已同步');
  } catch(e){
    document.getElementById('lockError').textContent='网络错误，请检查连接';
    setSyncStatus('error','同步失败');
  }
}

function initState(d){
  if(!d.habits) d.habits=DEF_HABITS.map(h=>({...h}));
  if(!d.rewards) d.rewards=DEF_REWARDS.map(r=>({...r}));
  if(!d.log) d.log=[];
  if(!d.redeems) d.redeems=[];
  if(!d.nextId) d.nextId=300;
  if(!d.hCounts) d.hCounts={};
  if(d.todayDate!==today){d.todayDate=today;d.todayDone=[];}
  if(!d.todayDone) d.todayDone=[];
  return d;
}

function setSyncStatus(status,text){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  if(txt) txt.textContent=text;
}

async function syncToCloud(){
  setSyncStatus('syncing','同步中...');
  try {
    await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json','X-Password':PWD},body:JSON.stringify(S)});
    setSyncStatus('ok','已同步');
  } catch(e){ setSyncStatus('error','同步失败'); }
}

function save(){ clearTimeout(syncTimer); syncTimer=setTimeout(syncToCloud,800); }

function todayScore(){ return S.log.filter(l=>l.date===today).reduce((a,l)=>a+l.pts,0); }
function totalAvail(){ return S.log.reduce((a,l)=>a+l.pts,0)-S.redeems.reduce((a,r)=>a+r.cost,0); }
function totalEarned(){ return S.log.reduce((a,l)=>a+l.pts,0); }

function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color||'#1D9E75';
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),2200);
}

function renderTopScore(){
  document.getElementById('todayScore').textContent=Math.round(todayScore());
  document.getElementById('totalScore').textContent=Math.round(totalAvail());
}

function renderHabits(){
  const list=document.getElementById('habitList'); list.innerHTML='';
  S.habits.forEach(h=>{
    const done=S.todayDone.includes(h.id);
    const d=document.createElement('div'); d.className='habit-card'+(done?' done':'');
    d.innerHTML=`<div class="h-icon">${h.icon}</div><div class="h-info"><div class="h-name">${h.name}</div><div class="h-pts">${h.pts} 分</div></div><div class="edit-btn" onclick="openHabitEdit(${h.id})">编辑</div><div class="h-check" onclick="toggleHabit(${h.id},${h.pts})"><div class="ck-inner"></div></div>`;
    list.appendChild(d);
  });
  const n=S.todayDone.length,t=S.habits.length;
  document.getElementById('progressText').textContent=`今日进度：${n} / ${t}`;
  document.getElementById('progressBar').style.width=t?Math.round(n/t*100)+'%':'0%';
  renderTopScore();
}

function toggleHabit(id,pts){
  if(S.todayDone.includes(id)){
    S.todayDone=S.todayDone.filter(x=>x!==id);
    S.log=S.log.filter(l=>!(l.date===today&&l.habitId===id));
    if(S.hCounts[id]) S.hCounts[id]=Math.max(0,S.hCounts[id]-1);
    showToast('已取消打卡','#888888');
  } else {
    S.todayDone.push(id);
    const h=S.habits.find(x=>x.id===id);
    S.log.push({date:today,habitId:id,habitName:h.name,pts,time:new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})});
    S.hCounts[id]=(S.hCounts[id]||0)+1;
    showToast(`+${pts} 分！`);
  }
  save(); renderHabits();
}

function openHabitModal(){ editHabitId=null; document.getElementById('habitModalTitle').textContent='添加习惯'; document.getElementById('hName').value=''; document.getElementById('hPts').value='2'; document.getElementById('hIcon').value=''; document.getElementById('hDeleteBtn').classList.add('hidden'); document.getElementById('habitModal').classList.remove('hidden'); }
function openHabitEdit(id){ const h=S.habits.find(x=>x.id===id); editHabitId=id; document.getElementById('habitModalTitle').textContent='编辑习惯'; document.getElementById('hName').value=h.name; document.getElementById('hPts').value=h.pts; document.getElementById('hIcon').value=h.icon; document.getElementById('hDeleteBtn').classList.remove('hidden'); document.getElementById('habitModal').classList.remove('hidden'); }
function closeHabitModal(){ document.getElementById('habitModal').classList.add('hidden'); }
function saveHabit(){
  const name=document.getElementById('hName').value.trim();
  const pts=parseInt(document.getElementById('hPts').value)||1;
  const icon=document.getElementById('hIcon').value.trim()||'⭐';
  if(!name) return;
  if(editHabitId){ const h=S.habits.find(x=>x.id===editHabitId); h.name=name; h.pts=pts; h.icon=icon; showToast('已更新'); }
  else { S.habits.push({id:S.nextId++,name,pts,icon}); showToast('习惯已添加'); }
  save(); closeHabitModal(); renderHabits();
}
function deleteHabit(){
  if(!confirm('确认删除这个习惯？')) return;
  S.habits=S.habits.filter(x=>x.id!==editHabitId); S.todayDone=S.todayDone.filter(x=>x!==editHabitId);
  save(); closeHabitModal(); renderHabits(); showToast('已删除','#888888');
}

function renderShop(){
  const grid=document.getElementById('shopGrid'); const avail=totalAvail(); grid.innerHTML='';
  S.rewards.forEach(r=>{
    const can=avail>=r.cost; const d=document.createElement('div'); d.className='shop-card'+(can?'':' unaffordable');
    d.innerHTML=`<div class="sh-icon">${r.icon}</div><div class="sh-name">${r.name}</div><div class="sh-cost">${r.cost} 积分</div><div class="sh-edit" onclick="event.stopPropagation();openShopEdit(${r.id})">编辑</div>`;
    if(can) d.onclick=()=>redeem(r.id); grid.appendChild(d);
  });
  const rl=document.getElementById('redeemList');
  if(!S.redeems.length){ rl.innerHTML='<div style="font-size:13px;color:var(--text2);padding:0.5rem 0;">暂无兑换记录</div>'; return; }
  rl.innerHTML=S.redeems.slice().reverse().slice(0,10).map(r=>`<div class="redeem-item"><div class="r-dot"></div><div>${r.name}</div><div style="color:var(--amber);font-size:13px;margin-left:auto;">-${r.cost} 分</div><div style="font-size:11px;color:var(--text2);margin-left:8px;">${r.date}</div></div>`).join('');
}
function redeem(id){
  const r=S.rewards.find(x=>x.id===id);
  if(totalAvail()<r.cost){ showToast('积分不足','#E24B4A'); return; }
  if(!confirm(`确认兑换「${r.name}」，消耗 ${r.cost} 积分？`)) return;
  S.redeems.push({...r,date:today}); save(); renderTopScore(); renderShop();
  showToast(`🎉 已兑换：${r.name}`,'#BA7517');
}
function openShopModal(){ editRewardId=null; document.getElementById('shopModalTitle').textContent='添加奖励'; document.getElementById('sName').value=''; document.getElementById('sCost').value='50'; document.getElementById('sIcon').value=''; document.getElementById('sDeleteBtn').classList.add('hidden'); document.getElementById('shopModal').classList.remove('hidden'); }
function openShopEdit(id){ const r=S.rewards.find(x=>x.id===id); editRewardId=id; document.getElementById('shopModalTitle').textContent='编辑奖励'; document.getElementById('sName').value=r.name; document.getElementById('sCost').value=r.cost; document.getElementById('sIcon').value=r.icon; document.getElementById('sDeleteBtn').classList.remove('hidden'); document.getElementById('shopModal').classList.remove('hidden'); }
function closeShopModal(){ document.getElementById('shopModal').classList.add('hidden'); }
function saveReward(){
  const name=document.getElementById('sName').value.trim(); const cost=parseInt(document.getElementById('sCost').value)||10; const icon=document.getElementById('sIcon').value.trim()||'🎁';
  if(!name) return;
  if(editRewardId){ const r=S.rewards.find(x=>x.id===editRewardId); r.name=name; r.cost=cost; r.icon=icon; showToast('已更新'); }
  else { S.rewards.push({id:S.nextId++,name,cost,icon}); showToast('奖励已添加'); }
  save(); closeShopModal(); renderShop();
}
function deleteReward(){ if(!confirm('确认删除这个奖励？')) return; S.rewards=S.rewards.filter(x=>x.id!==editRewardId); save(); closeShopModal(); renderShop(); showToast('已删除','#888888'); }

function renderStats(){
  document.getElementById('statTotal').textContent=Math.round(totalEarned());
  const days=new Set(S.log.map(l=>l.date)).size; document.getElementById('statDays').textContent=days;
  const ds={}; S.log.forEach(l=>{ds[l.date]=(ds[l.date]||0)+l.pts;});
  document.getElementById('statBest').textContent=Object.values(ds).length?Math.round(Math.max(...Object.values(ds))):0;
  const last7=[]; for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);last7.push({label:`${d.getMonth()+1}/${d.getDate()}`,score:Math.round(ds[k]||0)});}
  if(window._tc) window._tc.destroy();
  window._tc=new Chart(document.getElementById('trendChart'),{type:'line',data:{labels:last7.map(x=>x.label),datasets:[{data:last7.map(x=>x.score),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#1D9E75',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#888'},grid:{display:false}},y:{ticks:{font:{size:11},color:'#888'},beginAtZero:true,grid:{color:'rgba(128,128,128,0.1)'}}}}});
  if(window._hc) window._hc.destroy();
  window._hc=new Chart(document.getElementById('habitChart'),{type:'bar',data:{labels:S.habits.map(h=>h.icon+' '+h.name),datasets:[{data:S.habits.map(h=>S.hCounts[h.id]||0),backgroundColor:'#9FE1CB',borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#888'},beginAtZero:true,grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{font:{size:11},color:'#888'},grid:{display:false}}}}});
}

function renderHistory(){
  const all=[...S.log.map(l=>({...l,_type:'checkin'})),...S.redeems.map(r=>({...r,_type:'redeem'}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50);
  const hl=document.getElementById('historyList');
  if(!all.length){hl.innerHTML='<div style="font-size:13px;color:var(--text2);padding:1rem 0;">暂无记录，开始打卡吧！</div>';return;}
  hl.innerHTML=all.map(l=>l._type==='checkin'
    ?`<div class="history-item"><div class="h-dot"></div><div>${l.habitName}</div><div style="color:var(--green);font-size:12px;margin-left:auto;">+${l.pts} 分</div><div class="h-time">&nbsp;${l.date} ${l.time||''}</div></div>`
    :`<div class="history-item"><div class="h-dot" style="background:var(--amber)"></div><div>兑换：${l.name}</div><div style="color:var(--amber);font-size:12px;margin-left:auto;">-${l.cost} 分</div><div class="h-time">&nbsp;${l.date}</div></div>`
  ).join('');
}

function switchTab(tab){
  ['today','shop','stats','history'].forEach(t=>{ document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab); });
  document.querySelectorAll('.tab').forEach((el,i)=>{ el.classList.toggle('active',['today','shop','stats','history'][i]===tab); });
  if(tab==='shop') renderShop(); if(tab==='stats') renderStats(); if(tab==='history') renderHistory();
}
</script>
</body>
</html>
